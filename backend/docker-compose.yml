services:
  #nginx
  nginx:
    image: nginx:alpine
    container_name: beacon_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
      - keycloak
    networks:
      - beacon_network

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: beacon_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: beacon
    ports:
      - "5432:5432"
    volumes:
      - ../data/postgres:/var/lib/postgresql/data
    networks:
      - beacon_network

  # Keycloak SSO
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: beacon_sso
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: pass
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "8080:8080"
    volumes:
      - ../data/keycloak:/opt/keycloak/data
    networks:
      - beacon_network

  # Backend (Rust) - Development Mode
  backend:
    image: rust:1.75-slim
    container_name: beacon_backend_dev
    working_dir: /app/backend
    volumes:
      - .:/app/backend
      - /var/run/docker.sock:/var/run/docker.sock
      - ../data/instances:/data/instances
      - cargo_cache:/usr/local/cargo/registry
      - target_cache:/app/backend/target
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: >
      sh -c "apt-get update && apt-get install -y pkg-config libssl-dev && 
             cargo run"
    networks:
      - beacon_network
      - beacon_servers

  # Frontend (Vue) - Development Mode
  frontend:
    image: node:20-alpine
    container_name: beacon_frontend_dev
    working_dir: /app/beacon-frontend
    volumes:
      - ../beacon-frontend:/app/beacon-frontend
      - /app/beacon-frontend/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    networks:
      - beacon_network

networks:
  beacon_network:
    driver: bridge
  beacon_servers:
    driver: bridge

volumes:
  cargo_cache:
  target_cache: