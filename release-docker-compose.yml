version: '3.8'

services:
  # 1. The Rust API (Project Beacon Backend)
  backend:
    image: ubuntu:22.04
    container_name: beacon-backend
    restart: unless-stopped
    volumes:
      - ./bin/backend:/usr/local/bin/backend:ro
      - ./.env:/app/.env:ro
    working_dir: /app
    command: /usr/local/bin/backend
    # We don't necessarily need to expose 8080 to the host anymore 
    # because Nginx will talk to it internally.
    expose:
      - "8000"

  # 2. The Node.js Application Server (Serving Vue)
  frontend-node:
    image: node:20-alpine
    container_name: beacon-frontend-node
    restart: unless-stopped
    environment:          # This "bakes" the URL into the JS files during the build
          VITE_API_URL: http://api.beacon.local/api/v1
    working_dir: /app
    volumes:
      - ./frontend:/app/frontend:ro
    # Using 'serve' to host the static files on 5173
    command: sh -c "npm install -g serve && serve -s frontend -l 5173"
    expose:
      - "5173"

  # 3. The Nginx Reverse Proxy (The Entry Point)
  gateway-nginx:
    image: nginx:stable-alpine
    container_name: beacon-gateway
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend-node

networks:
  default:
    name: beacon-network