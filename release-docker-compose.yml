version: '3.8'

services:
  # 1. PostgreSQL Database (V4 Reset)
  postgres:
    image: postgres:16-alpine
    container_name: beacon_db_prod
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=${POSTGRES_DB:-beacon_db}
    ports:
      - "5436:5432"
    volumes:
      - ./migrations/0001_init.sql:/docker-entrypoint-initdb.d/01-init.sql
      # ADD THIS BACK: Ensures your data persists!
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - beacon_network

  # 2. Backend (Rust V4)
  backend:
    platform: linux/amd64
    image: ubuntu:24.04
    container_name: beacon_backend_prod
    restart: unless-stopped
    volumes:
      # Keep it :ro for security; as long as the host file is +x, it works!
      - ./bin/backend:/app/beacon
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /app
    # Run the binary directly
    command: sh -c "chmod +x ./beacon && ./beacon"
    # If you need a shell for any reason, use this format instead:
    # command: sh -c "./beacon"
    env_file:
      - ./.env
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    ports:
      - "8000:8000"
    networks:
      - beacon_network
    depends_on:
      - postgres

# 4. Frontend (Production Node.js Server)
  frontend:
    image: node:20-alpine
    container_name: beacon_frontend_prod
    restart: unless-stopped
    working_dir: /app
    environment:
      - VITE_API_URL=http://api.beacon.local/api/v1
    volumes:
      # Map the local frontend folder (which is the dist) directly to /app
      - ./frontend:/app:ro
    ports:
      - "5173:5173"
    # Serve the CURRENT directory (.) as a single-page app (-s)
    command: sh -c "npm install -g serve && serve -s . -l 5173"
    networks:
      - beacon_network

  # 5. Nginx Proxy
  nginx:
    image: nginx:alpine
    container_name: beacon_proxy_prod
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
    networks:
      - beacon_network

networks:
  beacon_network:
    driver: bridge
