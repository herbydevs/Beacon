services:
  # PostgreSQL Database (V4 Reset)
  postgres:
    image: postgres:16-alpine
    container_name: beacon_db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      # Maps port 5436 on your Mac to 5432 in the container
      - "5436:5432"
    volumes:
      - ../data/postgres:/var/lib/postgresql/data
      # Automatically creates the 'users' table on fresh start
      - ./backend/migrations/0001_init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - beacon_network

  # Backend (Rust V4: Using 1.80 for modern lockfile support)
  backend:
    build:
      context: .
      dockerfile: .Dockerfile
    container_name: beacon_backend_dev
    # 1. REMOVE or COMMENT OUT the volume mount for now
    # volumes:
    #   - ./backend:/app/backend 
    
    # 2. Set the working directory to where the binary IS
    working_dir: /app
    
    # 3. Ensure the command points to the binary in the WORKDIR
    command: ./beacon
    
    env_file:
      - backend/.env
    ports:
      - "8000:8000"
    networks:
      - beacon_network
    depends_on:
      - postgres

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # Keycloak SSO
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: beacon_sso
    command: start-dev
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - KC_HTTP_ENABLED=true
      - KC_HOSTNAME_STRICT=false
      - KC_HOSTNAME_STRICT_HTTPS=false
    ports:
      - "8080:8080"
    volumes:
      - ../data/keycloak:/opt/keycloak/data
    networks:
      - beacon_network

  # Frontend (Vue)
  frontend:
    image: node:20-alpine
    container_name: beacon_frontend_dev
    working_dir: /app/beacon-frontend
    environment:          # This "bakes" the URL into the JS files during the build
          VITE_API_URL: http://api.beacon.local/api/v1
    volumes:
      - ./beacon-frontend:/app/beacon-frontend
      - /app/beacon-frontend/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    networks:
      - beacon_network

  # Nginx Proxy
  nginx:
    image: nginx:alpine
    container_name: beacon_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
      - keycloak
    networks:
      - beacon_network

networks:
  beacon_network:
    driver: bridge