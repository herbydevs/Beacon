name: Beacon Alpha 

on:
  push:
    tags: ['alpha*']

permissions:
  contents: write

jobs:
  # STAGE 0: Build Linux Backend
  build-backend-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install Cross-Linker
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-x86-64-linux-gnu

      - name: Build Backend (Linux)
        working-directory: ./backend
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Upload Linux Backend
        uses: actions/upload-artifact@v4
        with:
          name: backend-linux-bin
          path: backend/target/x86_64-unknown-linux-gnu/release/backend

  # STAGE 1: Build Host Release
  build-host-alpha:
    needs: build-backend-linux
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: -windows
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: -macos
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          path: Beacon

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Frontend
        working-directory: ./Beacon/beacon-frontend
        run: |
          npm install
          npm run build

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Build Host Orchestrator
        working-directory: ./Beacon/beacon-host
        run: cargo build --release --target ${{ matrix.target }}

      - name: Download Linux Backend
        uses: actions/download-artifact@v4
        with:
          name: backend-linux-bin
          path: ./Beacon/backend/target/linux-release/

      - name: Package Host Alpha
        shell: bash
        run: |
          mkdir -p ./host-release/bin
          mkdir -p ./host-release/frontend
          mkdir -p ./host-release/nginx
          mkdir -p ./host-release/database
          
          EXT=""
          if [ "${{ matrix.os }}" = "windows-latest" ]; then EXT=".exe"; fi
          
          # Copy Binaries
          cp ./Beacon/backend/target/linux-release/backend ./host-release/bin/backend
          cp ./Beacon/beacon-host/target/${{ matrix.target }}/release/beacon-host$EXT ./host-release/
          
          # Copy Assets
          cp -rp ./Beacon/beacon-frontend/dist/. ./host-release/frontend/
          cp ./Beacon/release-docker-compose.yml ./host-release/docker-compose.yml
          cp ./Beacon/nginx/prod.conf ./host-release/nginx/default.conf
          
          # Handle optional files safely
          if [ -f "./Beacon/prod.env" ]; then cp ./Beacon/prod.env ./host-release/.env; fi
          if [ -d "./Beacon/database" ]; then cp -r ./Beacon/database/. ./host-release/database/; fi

      - name: Upload Host Artifact
        uses: actions/upload-artifact@v4
        with:
          name: beacon-host-release${{ matrix.suffix }}
          path: ./host-release/

  # STAGE 2: Build Client
  build-client-alpha:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: -windows
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: -macos
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build and Package Client
        shell: bash
        run: |
          cd beacon-client
          cargo build --release --target ${{ matrix.target }}
          cd ..
          mkdir -p ./client-release
          
          EXT=""
          if [ "${{ matrix.os }}" = "windows-latest" ]; then EXT=".exe"; fi
          cp "./beacon-client/target/${{ matrix.target }}/release/beacon-client$EXT" ./client-release/beacon-client${{ matrix.suffix }}$EXT

      - name: Upload Client Artifact
        uses: actions/upload-artifact@v4
        with:
          name: beacon-client-release${{ matrix.suffix }}
          path: ./client-release/

  # STAGE 3: Final Release
  create-alpha:
    needs: [build-host-alpha, build-client-alpha]
    runs-on: ubuntu-latest
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4

      - name: Archive Host Folders
        run: |
          zip -r beacon-host-windows.zip beacon-host-release-windows/
          tar -czvf beacon-host-macos.tar.gz beacon-host-release-macos/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          files: |
            beacon-host-windows.zip
            beacon-host-macos.tar.gz
            beacon-client-release-windows/beacon-client-windows.exe
            beacon-client-release-macos/beacon-client-macos
          generate_release_notes: true