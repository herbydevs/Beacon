# Global Resolver: 127.0.0.11 is Docker's internal DNS.
# 'valid=5s' makes Nginx re-check the IP frequently if a container restarts.
resolver 127.0.0.11 valid=5s;

# Standard Proxy Headers
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host $host;

# 1. Frontend & General Routing (app.beacon.local)
server {
    listen 80;
    server_name localhost app.beacon.local beacon.local; 

    location / {
        proxy_intercept_errors on;
        error_page 502 503 504 = @frontend_fallback;

        set $upstream_frontend http://beacon_frontend_prod:5173;
        proxy_pass $upstream_frontend;
        
        # Web Socket support for HMR
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location @frontend_fallback {
        proxy_pass http://host.docker.internal:5173;
    }
}

# 2. Keycloak SSO (sso.beacon.local)
server {
    listen 80;
    server_name sso.beacon.local;

    location / {
        proxy_intercept_errors on;
        error_page 502 503 504 = @sso_fallback;

        set $upstream_sso http://beacon_sso:8080;
        proxy_pass $upstream_sso;
    }

    location @sso_fallback {
        proxy_pass http://host.docker.internal:8080;
    }
}

# 3. Backend API (api.beacon.local)
server {
    listen 80;
    server_name api.beacon.local;

    location / {
        proxy_intercept_errors on;
        error_page 502 503 504 = @backend_fallback;

        set $upstream_backend http://beacon_backend_prod:8000;
        proxy_pass $upstream_backend;
    }

    location @backend_fallback {
        # This allows you to run your Rust backend or Python/Node 
        # API directly on your machine instead of in Docker.
        proxy_pass http://host.docker.internal:8000;
    }
}