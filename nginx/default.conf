# Shared proxy settings
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;

# 1. Frontend & General Routing
server {
    listen 80;
    server_name localhost app.beacon.local;

    # Internal Docker DNS resolver
    resolver 127.0.0.11 valid=30s;

    location / {
        set $upstream_frontend http://beacon_frontend_dev:5173;
        proxy_pass $upstream_frontend;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }
}

# 2. Keycloak SSO
server {
    listen 80;
    server_name sso.beacon.local;

    resolver 127.0.0.11 valid=30s;

    location / {
        set $upstream_sso http://beacon_sso:8080;
        proxy_pass $upstream_sso;
    }
}

# 3. Backend API
server {
    listen 80;
    server_name api.beacon.local;

    resolver 127.0.0.11 valid=30s;

    location / {
        # This prevents the "host not found" error during startup
        set $upstream_backend http://beacon_backend_dev:8000;
        proxy_pass $upstream_backend;
    }
}